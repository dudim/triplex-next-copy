name: CI

on:
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci

      - name: Check circular dependencies
        run: npm run deps:cycles

      - name: Build library
        run: npm run build
